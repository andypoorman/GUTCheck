name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.2"
          use-dotnet: false

      - name: Install GUT
        run: |
          curl -sL https://github.com/bitwes/Gut/archive/refs/tags/v9.6.0.tar.gz | tar xz
          cp -r Gut-9.6.0/addons/gut addons/gut
          rm -rf Gut-9.6.0

      - name: Import project
        run: godot --headless --path . --editor --quit

      - name: Run GUT tests with coverage
        run: |
          godot --headless --path . \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=.gutconfig.ci.json

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
